function genId() { return "h_" + Math.random().toString(36).slice(2, 10); }

function loadLogs() {
  try {
    const raw = localStorage.getItem("gymLogs_v2");
    return raw ? JSON.parse(raw) : {};
  } catch (e) { return {}; }
}
function saveLogs(logs) {
  try { localStorage.setItem("gymLogs_v2", JSON.stringify(logs)); } catch (e) {}
}

function App() {
  const [darkMode, setDarkMode] = React.useState(() => {
    const saved = localStorage.getItem("darkMode_v1");
    return saved !== null ? saved === "true" : true;
  });
  const [logs, setLogs] = React.useState(loadLogs());
  const [activeAy, setActiveAy] = React.useState(() => localStorage.getItem("activeAy_v2") || "İyun");
  const [selTarix, setSelTarix] = React.useState(null);
  const [saveStatus, setSaveStatus] = React.useState("idle");
  const [copyStatus, setCopyStatus] = React.useState("idle");
  const [backupStatus, setBackupStatus] = React.useState("idle");
  const [restoreStatus, setRestoreStatus] = React.useState("idle");
  const fileInputRef = React.useRef(null);
  const [now, setNow] = React.useState(new Date());
  React.useEffect(() => {
    const timer = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(timer);
  }, []);
  const GUNLER_AZ_SHORT = ["Bazar","Bazar ertəsi","Çərşənbə axşamı","Çərşənbə","Cümə axşamı","Cümə","Şənbə"];
  const formatClock = (d) => {
    const hh = String(d.getHours()).padStart(2,"0");
    const mm = String(d.getMinutes()).padStart(2,"0");
    const ss = String(d.getSeconds()).padStart(2,"0");
    const dd = String(d.getDate()).padStart(2,"0");
    const mo = String(d.getMonth()+1).padStart(2,"0");
    const yy = d.getFullYear();
    const gun = GUNLER_AZ_SHORT[d.getDay()];
    return { saat: `${hh}:${mm}:${ss}`, tarix: `${dd}.${mo}.${yy}`, gun };
  };

  React.useEffect(() => {
    document.body.className = darkMode ? "dark" : "light";
  }, [darkMode]);

  const D = darkMode;
  const colors = {
    bg: D ? "#0d0d1a" : "#ffffff",
    card: D ? "#15152a" : "#f7f7fa",
    card2: D ? "#1a1a35" : "#eeeeee",
    row1: D ? "#111122" : "#ffffff",
    rowDone: D ? "#0d2a0d" : "#e8f5e8",
    rowBorderDone: D ? "#2a5a2a" : "#4caf50",
    rowBorder: D ? "#1e1e3a" : "#e0e0e0",
    text: D ? "#e0e0e0" : "#212121",
    textMuted: D ? "#888" : "#616161",
    textDone: D ? "#7dff7d" : "#2e7d32",
    inputBg: D ? "#2a2a4a" : "#ffffff",
    inputBorder: D ? "#444" : "#bdbdbd",
    gold: D ? "#FFD700" : "#1565c0",
    statBg: D ? "#1a1a30" : "#f5f5f5",
    statBorder: D ? "#333" : "#e0e0e0",
    ayActive: D ? "#FFD700" : "#1565c0",
    ayActiveTxt: D ? "#0d0d1a" : "#ffffff",
    ayBg: D ? "#1a1a30" : "#eeeeee",
    ayTxt: D ? "#888" : "#424242",
    ayBorder: D ? "#333" : "#e0e0e0",
  };

  const getLog = (tarix) => logs[tarix] || { gymGun: null, done: false, muddet: 0, hereketDone: [], note: "" };
  const updateLog = (tarix, newLog) => {
    setLogs(prev => {
      const next = { ...prev, [tarix]: JSON.parse(JSON.stringify(newLog)) };
      saveLogs(next);
      return next;
    });
  };

  const hasNote = (log) => !!(log.note || log.enerji || log.ruhhal || log.agri);

  const toggleHereket = (tarix, idx) => {
    const log = getLog(tarix);
    const hd = log.hereketDone || [];
    const next = hd.includes(idx) ? hd.filter(x => x !== idx) : [...hd, idx];
    updateLog(tarix, { ...log, hereketDone: next });
  };

  const setGymGun = (tarix, gun) => {
    const log = getLog(tarix);
    if (log.gymGun !== gun) {
      updateLog(tarix, { ...log, gymGun: gun, hereketDone: [] });
    }
  };

  const handleSave = () => {
    saveLogs(logs);
    setSaveStatus("saved");
    setTimeout(() => setSaveStatus("idle"), 2000);
  };

  const handleBackup = () => {
    const payload = { version: 2, exportedAt: new Date().toISOString(), logs };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const dstamp = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = `gym-yedek-${dstamp}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setBackupStatus("done");
    setTimeout(() => setBackupStatus("idle"), 2000);
  };

  const handleRestoreFile = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const parsed = JSON.parse(e.target.result);
        const restoredLogs = parsed && parsed.logs ? parsed.logs : parsed;
        if (!restoredLogs || typeof restoredLogs !== "object") throw new Error("invalid");
        setLogs(restoredLogs);
        saveLogs(restoredLogs);
        setRestoreStatus("done");
        setTimeout(() => setRestoreStatus("idle"), 2000);
      } catch (err) {
        setRestoreStatus("error");
        setTimeout(() => setRestoreStatus("idle"), 2500);
      }
    };
    reader.readAsText(file);
  };

  const handleExport = () => {
    const doneDays = GUNLER.filter(g => getLog(g.tarix).done);
    const noteDays = GUNLER.filter(g => {
      const log = getLog(g.tarix);
      return !log.done && hasNote(log);
    });
    let text = "🏋️ GYM HESABATI\n" + "=".repeat(30) + "\n";
    doneDays.forEach(g => {
      const log = getLog(g.tarix);
      const prog = log.gymGun ? GYM_PROQRAM[log.gymGun] : null;
      text += `\n📅 ${g.tarix} — ${g.gun} (${prog ? prog.label : "?"}, ${log.muddet || 0} dəq)\n`;
      if (prog) {
        prog.hereketler.forEach((h, i) => {
          const isDone = (log.hereketDone || []).includes(i) ? "✅" : "⬜";
          const sxemData = (log.sxem && log.sxem[i]) || {};
          const realSxem = (sxemData.set || sxemData.tekrar)
            ? `${sxemData.set || "?"}×${sxemData.tekrar || "?"}`
            : h.sxem;
          text += `  ${isDone} ${h.ad}: ${realSxem}\n`;
        });
      }
      if (log.enerji || log.ruhhal || log.agri || log.note) {
        text += `  📊 Dəyərləndirmə:\n`;
        if (log.enerji) text += `     ⚡ Enerji: ${log.enerji}/5\n`;
        if (log.ruhhal) text += `     😊 Ruh halı: ${log.ruhhal}\n`;
        if (log.agri) text += `     💪 Ağrı: ${log.agri}\n`;
        if (log.note) text += `     📝 ${log.note}\n`;
      }
    });
    if (noteDays.length > 0) {
      text += "\n" + "=".repeat(30) + "\n📖 DİGƏR QEYDLƏR\n";
      noteDays.forEach(g => {
        const log = getLog(g.tarix);
        text += `\n📅 ${g.tarix} — ${g.gun}\n`;
        if (log.enerji) text += `   ⚡ Enerji: ${log.enerji}/5\n`;
        if (log.ruhhal) text += `   😊 Ruh halı: ${log.ruhhal}\n`;
        if (log.agri) text += `   💪 Ağrı: ${log.agri}\n`;
        if (log.note) text += `   📝 ${log.note}\n`;
      });
    }
    text += "\n" + "=".repeat(30) + `\nCəmi: ${doneDays.length} gym günü`;
    navigator.clipboard.writeText(text).then(() => {
      setCopyStatus("copied");
      setTimeout(() => setCopyStatus("idle"), 2500);
    }).catch(() => alert(text));
  };

  const aylar = [...new Set(GUNLER.map(g => g.ay))];
  const filteredGunler = GUNLER.filter(g => g.ay === activeAy);
  const totalDone = GUNLER.filter(g => getLog(g.tarix).done).length;
  const selGun = selTarix ? GUNLER.find(g => g.tarix === selTarix) : null;
  const selLog = selTarix ? getLog(selTarix) : null;
  const selProg = selLog && selLog.gymGun ? GYM_PROQRAM[selLog.gymGun] : null;

  return (
    <div style={{ fontFamily: "Arial, sans-serif", color: colors.text, background: colors.bg, minHeight: "100vh", padding: 14 }}>

      <div style={{ textAlign: "center", marginBottom: 14 }}>
        <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 10 }}>
          <div style={{ fontSize: 20, fontWeight: "bold", color: colors.gold }}>🏋️ GYM CƏDVƏLİ</div>
          <button onClick={() => { const next = !darkMode; setDarkMode(next); localStorage.setItem("darkMode_v1", next); }}
            style={{ background: colors.statBg, border: `1px solid ${colors.statBorder}`, borderRadius: 20,
              padding: "4px 10px", cursor: "pointer", fontSize: 14, color: colors.text }}>
            {darkMode ? "☀️" : "🌙"}
          </button>
        </div>
        <div style={{ color: colors.textMuted, fontSize: 11, marginTop: 3 }}>17 İyun 2026 – 17 İyun 2027</div>
        <div style={{ marginTop: 8, display: "flex", justifyContent: "center", alignItems: "center", gap: 8 }}>
          <div style={{ background: colors.statBg, border: `1px solid ${colors.statBorder}`, borderRadius: 10,
            padding: "6px 16px", textAlign: "center" }}>
            <span style={{ fontSize: 22, fontWeight: "bold", color: colors.gold, fontFamily: "monospace", letterSpacing: 2 }}>
              {formatClock(now).saat}
            </span>
            <span style={{ fontSize: 12, color: colors.textMuted, marginLeft: 10 }}>
              {formatClock(now).tarix} · {formatClock(now).gun}
            </span>
          </div>
        </div>
      </div>

      <div style={{ display: "flex", gap: 8, marginBottom: 14, justifyContent: "center", flexWrap: "wrap" }}>
        {[
          { label: "Ümumi gym günü", val: totalDone, icon: "✅" },
          { label: "Sxem", val: "A·B·C", icon: "📅" },
          { label: "İstirahət", val: "60-90 san", icon: "⏱️" },
        ].map((s, i) => (
          <div key={i} style={{ background: colors.statBg, border: `1px solid ${colors.statBorder}`, borderRadius: 10, padding: "7px 14px", textAlign: "center", minWidth: 90 }}>
            <div style={{ fontSize: 16 }}>{s.icon}</div>
            <div style={{ color: colors.gold, fontWeight: "bold", fontSize: 15 }}>{s.val}</div>
            <div style={{ color: colors.textMuted, fontSize: 10 }}>{s.label}</div>
          </div>
        ))}
      </div>

      <div style={{ display: "flex", gap: 6, marginBottom: 14, justifyContent: "center", flexWrap: "wrap" }}>
        {aylar.map(ay => (
          <button key={ay} onClick={() => { setActiveAy(ay); setSelTarix(null); localStorage.setItem("activeAy_v2", ay); }}
            style={{ padding: "7px 14px", borderRadius: 20, cursor: "pointer", fontSize: 12, fontWeight: "bold",
              background: activeAy === ay ? colors.ayActive : colors.ayBg,
              color: activeAy === ay ? colors.ayActiveTxt : colors.ayTxt,
              border: activeAy === ay ? "none" : `1px solid ${colors.ayBorder}` }}>{ay}</button>
        ))}
      </div>

      {selTarix && selGun && selLog && (
        <div style={{ background: colors.card, border: `1px solid ${colors.gold}`, borderRadius: 12, padding: 14, marginBottom: 14 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div>
              <div style={{ color: colors.gold, fontWeight: "bold", fontSize: 15 }}>{selTarix}</div>
              <div style={{ color: colors.textMuted, fontSize: 12 }}>{selGun.gun}</div>
            </div>
            <button onClick={() => setSelTarix(null)} style={{ background: "none", border: "none", color: colors.textMuted, fontSize: 22, cursor: "pointer" }}>✕</button>
          </div>

          <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 14, flexWrap: "wrap" }}>
            <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
              <input type="checkbox" checked={selLog.done || false}
                onChange={e => updateLog(selTarix, { ...selLog, done: e.target.checked })}
                style={{ width: 18, height: 18, cursor: "pointer" }} />
              <span style={{ color: selLog.done ? colors.textDone : colors.textMuted, fontSize: 13, fontWeight: "bold", marginLeft: 4 }}>
                {selLog.done ? "✅ Tamamlandı" : "⬜ Tamamlanmadı"}
              </span>
            </label>
            <div style={{ display: "flex", alignItems: "center", gap: 6, marginLeft: "auto" }}>
              <span style={{ color: colors.textMuted, fontSize: 12 }}>⏱️</span>
              <input type="number" min="0" max="180"
                value={selLog.muddet === 0 ? "" : selLog.muddet}
                placeholder="0"
                onFocus={e => e.target.select()}
                onChange={e => updateLog(selTarix, { ...selLog, muddet: e.target.value === "" ? 0 : Number(e.target.value) })}
                style={{ width: 55, background: colors.inputBg, border: `1px solid ${colors.inputBorder}`,
                  color: colors.gold, borderRadius: 6, padding: "4px 8px", fontSize: 13, textAlign: "center" }} />
              <span style={{ color: colors.textMuted, fontSize: 12 }}>dəq</span>
            </div>
          </div>

          <div style={{ marginBottom: 12 }}>
            <div style={{ color: colors.textMuted, fontSize: 11, marginBottom: 6 }}>Bu gün hansı proqram?</div>
            <div style={{ display: "flex", gap: 6 }}>
              {["A", "B", "C"].map(g => (
                <button key={g} onClick={() => setGymGun(selTarix, g)}
                  style={{ flex: 1, padding: "9px 0", borderRadius: 8, border: `1px solid ${selLog.gymGun === g ? GYM_PROQRAM[g].color : colors.inputBorder}`,
                    cursor: "pointer", fontSize: 13, fontWeight: "bold",
                    background: selLog.gymGun === g ? GYM_PROQRAM[g].color + "22" : colors.inputBg,
                    color: selLog.gymGun === g ? GYM_PROQRAM[g].color : colors.textMuted }}>
                  {GYM_PROQRAM[g].label}
                </button>
              ))}
            </div>
          </div>

          {selProg && (
            <div style={{ background: colors.card2, borderRadius: 8, padding: 4, marginBottom: 14 }}>
              {selProg.hereketler.map((h, i) => {
                const isDone = (selLog.hereketDone || []).includes(i);
                const sxemData = (selLog.sxem && selLog.sxem[i]) || {};
                const setVal = sxemData.set !== undefined ? sxemData.set : "";
                const tekrarVal = sxemData.tekrar !== undefined ? sxemData.tekrar : "";
                const updateSxem = (field, val) => {
                  const nextSxem = { ...(selLog.sxem || {}) };
                  nextSxem[i] = { ...(nextSxem[i] || {}), [field]: val };
                  updateLog(selTarix, { ...selLog, sxem: nextSxem });
                };
                return (
                  <div key={i}
                    style={{ display: "flex", alignItems: "flex-start", gap: 10, padding: "10px 8px",
                      borderBottom: i === selProg.hereketler.length - 1 ? "none" : `1px solid ${colors.inputBorder}`,
                      opacity: isDone ? 0.5 : 1 }}>
                    <div style={{ minWidth: 22, height: 22, borderRadius: 7, background: GYM_PROQRAM[selLog.gymGun].color + "22",
                      color: GYM_PROQRAM[selLog.gymGun].color, display: "flex", alignItems: "center", justifyContent: "center",
                      fontWeight: "bold", fontSize: 12, flexShrink: 0, marginTop: 1 }}>
                      {i + 1}
                    </div>
                    <div onClick={() => toggleHereket(selTarix, i)} style={{ cursor: "pointer", marginTop: 1 }}>
                      <div style={{ width: 20, height: 20, borderRadius: 6, border: `1.5px solid ${isDone ? "#4CAF50" : colors.inputBorder}`,
                        background: isDone ? "#4CAF50" : "transparent", flexShrink: 0,
                        display: "flex", alignItems: "center", justifyContent: "center", color: "#0d0d1a", fontSize: 12, fontWeight: "bold" }}>
                        {isDone ? "✓" : ""}
                      </div>
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div onClick={() => toggleHereket(selTarix, i)} style={{ cursor: "pointer", fontSize: 13.5, fontWeight: "bold", textDecoration: isDone ? "line-through" : "none" }}>{h.ad}</div>
                      {h.qeyd && <div style={{ fontSize: 11, color: "#f59e0b", marginTop: 2 }}>⚠ {h.qeyd}</div>}
                      <div style={{ display: "flex", alignItems: "center", gap: 5, marginTop: 6 }}>
                        <input type="number" min="0" max="20" placeholder={h.sxem.split("×")[0] || "set"}
                          value={setVal}
                          onFocus={e => e.target.select()}
                          onChange={e => updateSxem("set", e.target.value)}
                          style={{ width: 40, background: colors.inputBg, border: `1px solid ${colors.inputBorder}`,
                            color: colors.gold, borderRadius: 6, padding: "4px 6px", fontSize: 12, textAlign: "center" }} />
                        <span style={{ color: colors.textMuted, fontSize: 12 }}>set ×</span>
                        <input type="text" placeholder={(h.sxem.split("×")[1] || "təkrar")}
                          value={tekrarVal}
                          onFocus={e => e.target.select()}
                          onChange={e => updateSxem("tekrar", e.target.value)}
                          style={{ width: 56, background: colors.inputBg, border: `1px solid ${colors.inputBorder}`,
                            color: colors.gold, borderRadius: 6, padding: "4px 6px", fontSize: 12, textAlign: "center" }} />
                        <span style={{ color: colors.textMuted, fontSize: 11 }}>təkrar</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          <div style={{ background: D ? "#0d1a2a" : "#e3f2fd", borderRadius: 10, padding: 12, border: `1px solid ${D ? "#1a3a5a" : "#90caf9"}` }}>
            <div style={{ color: D ? "#5B9BD5" : "#223355", fontWeight: "bold", fontSize: 13, marginBottom: 10 }}>📊 İdman Sonrası Dəyərləndirmə</div>

            <div style={{ marginBottom: 10 }}>
              <div style={{ color: colors.textMuted, fontSize: 11, marginBottom: 5 }}>⚡ Enerji:</div>
              <div style={{ display: "flex", gap: 6 }}>
                {[["1","😩"],["2","😕"],["3","😐"],["4","😊"],["5","🔥"]].map(([n, emoji]) => (
                  <button key={n} onClick={() => updateLog(selTarix, { ...selLog, enerji: Number(n) })}
                    style={{ flex: 1, height: 44, borderRadius: 8, border: "none", cursor: "pointer", fontSize: 13, fontWeight: "bold",
                      background: selLog.enerji === Number(n) ? "#FFD700" : (D ? "#1a1a35" : "#d0d0e8"),
                      color: selLog.enerji === Number(n) ? "#000" : (D ? "#aaa" : "#333") }}>
                    {emoji}<br/><span style={{fontSize:10}}>{n}/5</span>
                  </button>
                ))}
              </div>
            </div>

            <div style={{ marginBottom: 10 }}>
              <div style={{ color: colors.textMuted, fontSize: 11, marginBottom: 5 }}>😊 Ruh halı:</div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {[["😴","Yorğun"],["😐","Orta"],["🙂","Yaxşı"],["😄","Əla"],["🔥","Möhtəşəm"]].map(([emoji, label]) => (
                  <button key={label} onClick={() => updateLog(selTarix, { ...selLog, ruhhal: label })}
                    style={{ padding: "5px 10px", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 12,
                      background: selLog.ruhhal === label ? "#5B9BD5" : (D ? "#1a1a35" : "#d0d0e8"),
                      color: selLog.ruhhal === label ? "#fff" : (D ? "#aaa" : "#222") }}>
                    {emoji} {label}
                  </button>
                ))}
              </div>
            </div>

            <div style={{ marginBottom: 10 }}>
              <div style={{ color: colors.textMuted, fontSize: 11, marginBottom: 5 }}>💪 Əzələ ağrısı:</div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {[["✅","Yoxdur"],["⚠️","Az"],["🔴","Çox"]].map(([emoji, label]) => (
                  <button key={label} onClick={() => updateLog(selTarix, { ...selLog, agri: label })}
                    style={{ padding: "5px 10px", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 12,
                      background: selLog.agri === label ? "#5B9BD5" : (D ? "#1a1a35" : "#d0d0e8"),
                      color: selLog.agri === label ? "#fff" : (D ? "#aaa" : "#222") }}>
                    {emoji} {label}
                  </button>
                ))}
              </div>
            </div>

            <div>
              <div style={{ color: colors.textMuted, fontSize: 11, marginBottom: 5 }}>📝 Qeyd (ağrı, enerji, hiss):</div>
              <textarea
                value={selLog.note || ""}
                onChange={e => updateLog(selTarix, { ...selLog, note: e.target.value })}
                placeholder="Məs: sol dirsəkdə yüngül ağrı, enerji yaxşı idi..."
                rows={3}
                style={{ width: "100%", background: colors.inputBg, border: `1px solid ${colors.inputBorder}`,
                  color: colors.text, borderRadius: 8, padding: "10px", fontSize: 13, resize: "none", outline: "none",
                  fontFamily: "Arial, sans-serif", lineHeight: 1.6 }} />
            </div>
          </div>
        </div>
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        {filteredGunler.map((g) => {
          const log = getLog(g.tarix);
          const done = log.done;
          const note = hasNote(log);
          const isSel = selTarix === g.tarix;
          const progColor = log.gymGun ? GYM_PROQRAM[log.gymGun].color : null;
          return (
            <div key={g.tarix} onClick={() => setSelTarix(isSel ? null : g.tarix)}
              style={{
                background: isSel ? (D ? "#1e1e40" : "#dde8f5") : done ? colors.rowDone : colors.row1,
                border: `1px solid ${isSel ? colors.gold : done ? colors.rowBorderDone : colors.rowBorder}`,
                borderRadius: 8, padding: "8px 12px", cursor: "pointer", display: "flex", alignItems: "center", gap: 10
              }}>
              <div style={{ fontSize: 18, minWidth: 24, textAlign: "center" }}>
                {done ? "✅" : note ? "📝" : "⬜"}
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                  <span style={{ color: colors.textMuted, fontSize: 11 }}>{g.tarix}</span>
                  <span style={{ color: done ? colors.textDone : colors.text, fontSize: 13, fontWeight: "bold" }}>{g.gun}</span>
                  {log.gymGun && (
                    <span style={{ fontSize: 10, fontWeight: "bold", color: progColor, background: progColor + "22",
                      padding: "2px 7px", borderRadius: 10 }}>{GYM_PROQRAM[log.gymGun].label}</span>
                  )}
                  {log.muddet > 0 && (
                    <span style={{ fontSize: 10, color: colors.textMuted }}>⏱️ {log.muddet} dəq</span>
                  )}
                </div>
              </div>
              <div style={{ color: colors.textMuted, fontSize: 16 }}>›</div>
            </div>
          );
        })}
      </div>

      <div style={{ display: "flex", gap: 10, justifyContent: "center", marginTop: 20, paddingBottom: 20, flexWrap: "wrap" }}>
        <button onClick={handleSave}
          style={{ padding: "12px 30px", fontSize: 14, fontWeight: "bold", borderRadius: 10, border: "none", cursor: "pointer",
            background: saveStatus === "saved" ? "#4CAF50" : (D ? colors.gold : "#1565c0"),
            color: "#ffffff" }}>
          {saveStatus === "saved" ? "✅ Saxlanıldı!" : "💾 Saxla"}
        </button>
        <button onClick={handleExport}
          style={{ padding: "12px 30px", fontSize: 14, fontWeight: "bold", borderRadius: 10, cursor: "pointer",
            background: copyStatus === "copied" ? "#5B9BD5" : colors.statBg,
            color: copyStatus === "copied" ? "#fff" : "#5B9BD5",
            border: "1px solid #5B9BD5" }}>
          {copyStatus === "copied" ? "✅ Kopyalandı!" : "📋 Kloda paylaş"}
        </button>
        <button onClick={handleBackup}
          style={{ padding: "12px 30px", fontSize: 14, fontWeight: "bold", borderRadius: 10, cursor: "pointer",
            background: backupStatus === "done" ? "#2e7d32" : "transparent",
            color: backupStatus === "done" ? "#fff" : "#4CAF50",
            border: "1px solid #4CAF50" }}>
          {backupStatus === "done" ? "✅ Yedəkləndi!" : "💾 Yedəklə"}
        </button>
        <button onClick={() => fileInputRef.current && fileInputRef.current.click()}
          style={{ padding: "12px 30px", fontSize: 14, fontWeight: "bold", borderRadius: 10, cursor: "pointer",
            background: restoreStatus === "done" ? "#e65100" : "transparent",
            color: restoreStatus === "done" ? "#fff" : "#FF9800",
            border: `1px solid ${restoreStatus === "error" ? "#f44336" : "#FF9800"}` }}>
          {restoreStatus === "done" ? "✅ Bərpa olundu!" : restoreStatus === "error" ? "⚠ Səhv fayl" : "📂 Bərpa et"}
        </button>
        <input ref={fileInputRef} type="file" accept="application/json"
          onChange={e => { handleRestoreFile(e.target.files[0]); e.target.value = ""; }}
          style={{ display: "none" }} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
